name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
    outputs:
      is_prerelease: ${{ steps.metadata.outputs.is_prerelease }}
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Derive release metadata
        id: metadata
        run: |
          TAG="$GITHUB_REF_NAME"

          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?)$ ]]; then
            echo "Tag must be in vX.Y.Z or vX.Y.Z-suffix format, received: $TAG"
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          IS_PRERELEASE=false
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_PRERELEASE=true
          fi

          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"
          echo "DMG_PATH=$RUNNER_TEMP/PlexBar-${TAG}-arm64.dmg" >> "$GITHUB_ENV"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Load Sparkle build settings
        env:
          SPARKLE_APPCAST_URL: ${{ vars.SPARKLE_APPCAST_URL }}
          SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_PUBLIC_KEY }}
        run: |
          if [[ -z "${SPARKLE_APPCAST_URL:-}" ]]; then
            echo "Missing required repository variable: SPARKLE_APPCAST_URL"
            exit 1
          fi

          if [[ -z "${SPARKLE_PUBLIC_KEY:-}" ]]; then
            echo "Missing required repository variable: SPARKLE_PUBLIC_KEY"
            exit 1
          fi

          if [[ ! "${SPARKLE_APPCAST_URL}" =~ ^https://.+/appcast\.xml$ ]]; then
            echo "SPARKLE_APPCAST_URL must be an HTTPS URL ending in /appcast.xml"
            echo "Current value: ${SPARKLE_APPCAST_URL}"
            exit 1
          fi

          echo "SPARKLE_APPCAST_URL=$SPARKLE_APPCAST_URL" >> "$GITHUB_ENV"
          echo "SPARKLE_PUBLIC_KEY=$SPARKLE_PUBLIC_KEY" >> "$GITHUB_ENV"

      - name: Generate release notes
        run: |
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)"
          RELEASE_NOTES_PATH="$RUNNER_TEMP/release-notes.md"

          {
            echo "## Changes"

            if [[ -n "${PREVIOUS_TAG:-}" ]]; then
              git log --format='- %s' "${PREVIOUS_TAG}..${RELEASE_TAG}"
            else
              git log --format='- %s' "$RELEASE_TAG"
            fi
          } > "$RELEASE_NOTES_PATH"

          echo "RELEASE_NOTES_PATH=$RELEASE_NOTES_PATH" >> "$GITHUB_ENV"

      - name: Setup Swift 6.3.1
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3.1"

      - name: Install create-dmg
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install create-dmg

      - name: Import Apple signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/plexbar-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/plexbar-signing.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          if [[ -z "${P12_BASE64:-}" || -z "${P12_PASSWORD:-}" ]]; then
            echo "Missing required signing secrets: APPLE_CERT_P12_BASE64, APPLE_CERT_PASSWORD"
            exit 1
          fi

          printf '%s' "$P12_BASE64" | base64 -D -o "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build release app bundle
        env:
          BUILD_CONFIGURATION: release
          APP_MARKETING_VERSION: ${{ env.RELEASE_VERSION }}
          APP_BUILD_VERSION: ${{ env.BUILD_NUMBER }}
        run: script/build_and_run.sh build

      - name: Validate Sparkle release configuration
        env:
          SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          if [[ -z "${SPARKLE_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "Missing required Sparkle secret: SPARKLE_PRIVATE_KEY_BASE64"
            exit 1
          fi

          EMBEDDED_FEED_URL="$(/usr/libexec/PlistBuddy -c "Print :SUFeedURL" dist/PlexBar.app/Contents/Info.plist)"
          EMBEDDED_PUBLIC_KEY="$(/usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" dist/PlexBar.app/Contents/Info.plist)"

          if [[ "$EMBEDDED_FEED_URL" != "$SPARKLE_APPCAST_URL" ]]; then
            echo "Embedded SUFeedURL does not match SPARKLE_APPCAST_URL"
            echo "Expected: $SPARKLE_APPCAST_URL"
            echo "Actual: $EMBEDDED_FEED_URL"
            exit 1
          fi

          if [[ "$EMBEDDED_PUBLIC_KEY" != "$SPARKLE_PUBLIC_KEY" ]]; then
            echo "Embedded SUPublicEDKey does not match SPARKLE_PUBLIC_KEY"
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Print :SUVerifyUpdateBeforeExtraction" dist/PlexBar.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Print :SUEnableAutomaticChecks" dist/PlexBar.app/Contents/Info.plist

      - name: Sign app bundle
        run: |
          APP_PATH="dist/PlexBar.app"
          SPARKLE_FRAMEWORK="$APP_PATH/Contents/Frameworks/Sparkle.framework"
          CODE_SIGN_IDENTITY="Developer ID Application"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi

          if [[ ! -d "$SPARKLE_FRAMEWORK" ]]; then
            echo "Sparkle framework not found at $SPARKLE_FRAMEWORK"
            exit 1
          fi

          codesign --force \
            --options runtime \
            --sign "$CODE_SIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Installer.xpc"

          if [[ -d "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Downloader.xpc" ]]; then
            codesign --force \
              --options runtime \
              --preserve-metadata=entitlements \
              --sign "$CODE_SIGN_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --timestamp \
              "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Downloader.xpc"
          fi

          codesign --force \
            --options runtime \
            --sign "$CODE_SIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            "$SPARKLE_FRAMEWORK/Versions/B/Autoupdate"

          codesign --force \
            --options runtime \
            --sign "$CODE_SIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            "$SPARKLE_FRAMEWORK/Versions/B/Updater.app"

          codesign --force \
            --options runtime \
            --sign "$CODE_SIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            "$SPARKLE_FRAMEWORK"

          codesign --force \
            --options runtime \
            --sign "$CODE_SIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            "$APP_PATH"

      - name: Create signed DMG
        run: |
          DMG_BACKGROUND_PATH=".github/release-assets/background.png"
          APP_PATH="dist/PlexBar.app"
          VOLUME_ICON_PATH="$(find "$APP_PATH/Contents/Resources" -maxdepth 1 -type f -name '*.icns' -print -quit)"
          SETFILE_TOOL="$(xcrun --find SetFile)"
          REZ_TOOL="$(xcrun --find Rez)"
          DEREZ_TOOL="$(xcrun --find DeRez)"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi

          if [[ ! -f "$DMG_BACKGROUND_PATH" ]]; then
            echo "DMG background image not found at $DMG_BACKGROUND_PATH"
            exit 1
          fi

          if [[ -z "${VOLUME_ICON_PATH:-}" ]]; then
            echo "No .icns volume icon found in app bundle resources."
            exit 1
          fi

          rm -rf dmg-contents
          mkdir -p dmg-contents
          cp -R "$APP_PATH" dmg-contents/
          rm -f "$DMG_PATH"

          create-dmg \
            --volname "PlexBar $RELEASE_VERSION" \
            --volicon "$VOLUME_ICON_PATH" \
            --window-size 660 420 \
            --background "$DMG_BACKGROUND_PATH" \
            --icon-size 128 \
            --text-size 13 \
            --icon "PlexBar.app" 180 165 \
            --hide-extension "PlexBar.app" \
            --app-drop-link 480 165 \
            "$DMG_PATH" \
            "dmg-contents/"

          ICON_RESOURCE="$(mktemp "${RUNNER_TEMP}/PlexBarDMGIcon.XXXXXX")"
          ICON_COPY="$(mktemp "${RUNNER_TEMP}/PlexBarDMGIconSource.XXXXXX").icns"
          cp "$VOLUME_ICON_PATH" "$ICON_COPY"
          /usr/bin/sips -i "$ICON_COPY" >/dev/null
          "$DEREZ_TOOL" -only icns "$ICON_COPY" > "$ICON_RESOURCE"
          "$REZ_TOOL" -append "$ICON_RESOURCE" -o "$DMG_PATH"
          "$SETFILE_TOOL" -a C "$DMG_PATH"
          rm -f "$ICON_RESOURCE" "$ICON_COPY"

      - name: Sign DMG
        run: |
          codesign --force \
            --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            "$DMG_PATH"

      - name: Prepare notary API key
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          if [[ -z "${APPLE_API_KEY_ID:-}" || -z "${APPLE_API_ISSUER_ID:-}" || -z "${APPLE_API_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "Missing required notarization secrets: APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_PRIVATE_KEY_BASE64"
            exit 1
          fi

          NOTARY_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -D -o "$NOTARY_API_KEY_PATH"
          chmod 600 "$NOTARY_API_KEY_PATH"
          echo "NOTARY_API_KEY_PATH=$NOTARY_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          NOTARY_RESULT_PATH="$RUNNER_TEMP/notary-result.json"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$NOTARY_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --output-format json > "$NOTARY_RESULT_PATH"

          NOTARY_STATUS="$(/usr/bin/python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("status",""))' "$NOTARY_RESULT_PATH")"
          NOTARY_ID="$(/usr/bin/python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("id",""))' "$NOTARY_RESULT_PATH")"

          if [[ -z "${NOTARY_ID:-}" ]]; then
            echo "Notary submission id missing from notarytool response."
            exit 1
          fi

          if [[ "$NOTARY_STATUS" != "Accepted" ]]; then
            echo "Notary status is '$NOTARY_STATUS' (expected 'Accepted')."
            xcrun notarytool log "$NOTARY_ID" \
              --key "$NOTARY_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" || true
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Verify signed artifact
        run: |
          APP_PATH="dist/PlexBar.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --notes-file "$RELEASE_NOTES_PATH"
            gh release upload "$RELEASE_TAG" "$DMG_PATH" --clobber
          else
            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              gh release create "$RELEASE_TAG" \
                --title "$RELEASE_TAG" \
                --notes-file "$RELEASE_NOTES_PATH" \
                --prerelease \
                "$DMG_PATH"
            else
              gh release create "$RELEASE_TAG" \
                --title "$RELEASE_TAG" \
                --notes-file "$RELEASE_NOTES_PATH" \
                "$DMG_PATH"
            fi
          fi

      - name: Generate Sparkle appcast
        if: env.IS_PRERELEASE == 'false'
        env:
          SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          SPARKLE_BIN=".build/artifacts/sparkle/Sparkle/bin/generate_appcast"
          APPCAST_WORK_DIR="appcast-work"
          PAGES_DIR="pages"
          SPARKLE_KEY_PATH="$RUNNER_TEMP/sparkle-ed25519-private-key"
          DMG_FILENAME="$(basename "$DMG_PATH")"
          DOWNLOAD_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/"
          RELEASE_LINK="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"

          if [[ ! -x "$SPARKLE_BIN" ]]; then
            echo "Sparkle generate_appcast tool not found at $SPARKLE_BIN"
            exit 1
          fi

          rm -rf "$APPCAST_WORK_DIR" "$PAGES_DIR"
          mkdir -p "$APPCAST_WORK_DIR" "$PAGES_DIR"

          if curl -fsSL "$SPARKLE_APPCAST_URL" -o "$APPCAST_WORK_DIR/appcast.xml"; then
            echo "Using existing appcast.xml from $SPARKLE_APPCAST_URL"
          else
            echo "No existing appcast.xml found; generating a new feed"
          fi

          cp "$DMG_PATH" "$APPCAST_WORK_DIR/$DMG_FILENAME"
          printf '%s' "$SPARKLE_PRIVATE_KEY_BASE64" | base64 -D -o "$SPARKLE_KEY_PATH"
          chmod 600 "$SPARKLE_KEY_PATH"

          "$SPARKLE_BIN" \
            --ed-key-file "$SPARKLE_KEY_PATH" \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            --link "$RELEASE_LINK" \
            --maximum-deltas 0 \
            --maximum-versions 0 \
            "$APPCAST_WORK_DIR" | tee "$RUNNER_TEMP/generate-appcast.log"

          cp "$APPCAST_WORK_DIR/appcast.xml" "$PAGES_DIR/appcast.xml"

      - name: Validate appcast
        if: env.IS_PRERELEASE == 'false'
        run: |
          APPCAST_PATH="pages/appcast.xml"
          DMG_FILENAME="$(basename "$DMG_PATH")"

          if [[ ! -f "$APPCAST_PATH" ]]; then
            echo "Generated appcast.xml is missing"
            exit 1
          fi

          xmllint --noout "$APPCAST_PATH"

          if ! grep -q 'sparkle:edSignature=' "$APPCAST_PATH"; then
            echo "Generated appcast is missing sparkle:edSignature"
            exit 1
          fi

          if ! grep -q "$DMG_FILENAME" "$APPCAST_PATH"; then
            echo "Generated appcast is missing the current DMG enclosure"
            exit 1
          fi

      - name: Upload appcast build artifact
        if: env.IS_PRERELEASE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-appcast-${{ github.ref_name }}
          path: |
            pages/appcast.xml
            ${{ runner.temp }}/generate-appcast.log

  deploy-appcast:
    name: Deploy appcast
    needs: release
    if: needs.release.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download generated appcast artifact
        uses: actions/download-artifact@v4
        with:
          name: sparkle-appcast-${{ github.ref_name }}
          path: downloaded-appcast

      - name: Prepare Pages content
        run: |
          mkdir -p pages

          if [[ ! -f "downloaded-appcast/pages/appcast.xml" ]]; then
            echo "Expected appcast artifact at downloaded-appcast/pages/appcast.xml"
            find downloaded-appcast -maxdepth 3 -type f | sort
            exit 1
          fi

          cp "downloaded-appcast/pages/appcast.xml" "pages/appcast.xml"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
