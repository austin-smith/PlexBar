name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-build-and-test:
    name: macOS Build + Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Swift 6.3.1
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3.1"

      - name: Build
        run: swift build

      - name: Test
        run: swift test
